behaviors:
  Tag:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0001
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
      memory:
        memory_size: 64
        sequence_length: 4
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    max_steps: 3000000
    time_horizon: 1000
    summary_freq: 50000
    self_play:
      save_steps: 20000
      team_change: 50000
      swap_steps: 10000
      window: 10
      play_against_latest_model_ratio: 0.5
     